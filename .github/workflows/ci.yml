name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APKs (all modules)
        run: ./gradlew assembleDebug

      - name: Run unit tests (all modules)
        run: ./gradlew testDebugUnitTest

      - name: Run lint (all modules)
        run: ./gradlew lintDebug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            wear/build/reports/tests/
            shared/build/reports/tests/
            app/build/test-results/
            wear/build/test-results/
            shared/build/test-results/
          if-no-files-found: ignore

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-*.html
            wear/build/reports/lint-results-*.html
            shared/build/reports/lint-results-*.html
          if-no-files-found: ignore
